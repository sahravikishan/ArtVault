<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ArtVault{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}A private personal art-cataloging vault — curating paintings, stories, and artists.{% endblock %}" />

  <!-- ── Google Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />

  <!-- ── Theme CSS ── -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/theme.css' %}" />

  <!-- ── Theme JS (runs before DOMContentLoaded to avoid FOUC) ── -->
  <script src="{% static 'js/theme.js' %}"></script>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ── Site Header ── -->
  <header class="site-header">
    <div class="header-inner">

      <a href="{% url 'paintings:home' %}" class="site-logo" id="site-logo">
        <div class="logo-mark">A</div>
        <span class="logo-text">Art<span>Vault</span></span>
      </a>

      <nav class="site-nav" aria-label="Main navigation">
        <a href="{% url 'paintings:home' %}" id="nav-collection">Collection</a>
        <a href="/admin/" id="nav-admin">Admin</a>
      </nav>

      <div class="header-right">
        <!-- Sun / Moon toggle -->
        <button
          id="theme-toggle-btn"
          class="theme-toggle"
          aria-label="Switch to dark mode"
          title="Dark mode"
        >
          <!-- Moon (shown in light mode) -->
          <span class="icon-moon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
          <!-- Sun (shown in dark mode) -->
          <span class="icon-sun" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1"  x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22"   x2="5.64"  y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1"  y1="12" x2="3"  y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
              <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
            </svg>
          </span>
        </button>
      </div>

    </div>
  </header>

  <!-- ── Main Content ── -->
  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <p>ArtVault &mdash; <span class="gold">Private Collection</span> &mdash; All rights reserved</p>
  </footer>

</body>
</html>
