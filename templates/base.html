<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ArtVault{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}A private personal art-cataloging vault — curating paintings, stories, and artists.{% endblock %}" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Design Tokens ──────────────────────────────────── */
    :root {
      --cream:         #F6F1E7;
      --cream-dark:    #EDE5D4;
      --cream-deeper:  #E2D9C8;
      --sage:          #4A6741;
      --sage-light:    #6B8F62;
      --sage-dark:     #2E4228;
      --gold:          #B8862E;
      --gold-light:    #D4A84B;
      --gold-pale:     #F0DFB0;
      --burgundy:      #7A2E2E;
      --burgundy-dark: #5C2020;
      --ink:           #1A1410;
      --ink-soft:      #3D3228;
      --muted:         #8A7B6A;
      --border:        rgba(184,134,46,0.35);
      --border-strong: rgba(184,134,46,0.65);
      --shadow-sm:     0 2px 8px rgba(26,20,16,0.08);
      --shadow-md:     0 6px 24px rgba(26,20,16,0.12);
      --shadow-lg:     0 16px 48px rgba(26,20,16,0.18);
      --radius:        4px;
      --radius-md:     8px;
      --transition:    all 0.28s ease;
    }

    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--ink-soft);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
      color: var(--ink);
      line-height: 1.25;
    }

    a { color: var(--sage); text-decoration: none; transition: var(--transition); }
    a:hover { color: var(--gold); }

    img { max-width: 100%; display: block; }

    /* ── Header / Nav ───────────────────────────────────── */
    .site-header {
      background: var(--ink);
      border-bottom: 2px solid var(--gold);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .site-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .site-logo .logo-mark {
      width: 36px;
      height: 36px;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--gold);
      flex-shrink: 0;
    }

    .site-logo .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #F6F1E7;
      letter-spacing: 0.04em;
    }

    .site-logo .logo-text span {
      color: var(--gold);
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .site-nav a {
      color: rgba(246,241,231,0.75);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      transition: var(--transition);
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: var(--gold-light);
      background: rgba(184,134,46,0.12);
    }

    /* ── Main Content ───────────────────────────────────── */
    .site-main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }

    /* ── Footer ─────────────────────────────────────────── */
    .site-footer {
      background: var(--ink);
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
    }

    .site-footer p {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .site-footer span { color: var(--gold); }

    /* ── Page Header ─────────────────────────────────────── */
    .page-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .page-header .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Gold-Framed Image ───────────────────────────────── */
    .gold-frame {
      display: inline-block;
      padding: 8px;
      background: linear-gradient(135deg, var(--gold) 0%, #E8C46A 40%, var(--gold) 60%, #8A6020 100%);
      box-shadow: var(--shadow-md), inset 0 0 0 1px rgba(255,255,255,0.15);
      position: relative;
    }

    .gold-frame::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(255,255,255,0.25);
      pointer-events: none;
      z-index: 1;
    }

    .gold-frame img {
      display: block;
      position: relative;
      z-index: 0;
    }

    /* ── Painting Card ───────────────────────────────────── */
    .painting-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2.5rem;
    }

    .painting-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }

    .painting-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
      border-color: var(--gold);
    }

    .painting-card .card-image-wrap {
      overflow: hidden;
      background: var(--cream-dark);
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .painting-card .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.45s ease;
    }

    .painting-card:hover .card-image-wrap img {
      transform: scale(1.04);
    }

    .painting-card .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--cream-deeper);
      color: var(--muted);
      gap: 0.5rem;
    }

    .painting-card .card-placeholder svg {
      opacity: 0.4;
    }

    .painting-card .card-placeholder span {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card-body {
      padding: 1.25rem 1.4rem 1.4rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-style-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sage);
      background: rgba(74,103,65,0.1);
      border: 1px solid rgba(74,103,65,0.25);
      border-radius: 2px;
      padding: 0.2rem 0.55rem;
      margin-bottom: 0.6rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 0.3rem;
      line-height: 1.3;
    }

    .card-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: auto;
      padding-top: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-meta .artist-link {
      color: var(--sage);
      font-weight: 500;
    }

    .card-meta .artist-link:hover { color: var(--gold); }

    .card-value {
      color: var(--burgundy);
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* ── Filter Bar ─────────────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .filter-bar .filter-label {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 0.25rem;
    }

    .filter-btn {
      display: inline-block;
      padding: 0.35rem 1rem;
      border: 1px solid var(--border-strong);
      border-radius: 2px;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      color: var(--ink-soft);
      background: transparent;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }

    .filter-btn:hover {
      background: var(--gold-pale);
      border-color: var(--gold);
      color: var(--ink);
    }

    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
      font-weight: 600;
    }

    /* ── Detail Page ─────────────────────────────────────── */
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    @media (max-width: 800px) {
      .detail-layout { grid-template-columns: 1fr; gap: 2rem; }
    }

    .detail-image-col .gold-frame {
      width: 100%;
    }

    .detail-image-col .gold-frame img {
      width: 100%;
      height: auto;
      max-height: 600px;
      object-fit: contain;
    }

    .detail-info h1 {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      margin-bottom: 0.4rem;
    }

    .detail-artist-link {
      font-size: 1rem;
      color: var(--sage);
      font-weight: 500;
      margin-bottom: 1.5rem;
      display: block;
    }

    .detail-artist-link:hover { color: var(--gold); }

    .detail-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.5rem;
      margin-bottom: 1.75rem;
    }

    .meta-item label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .meta-item .meta-value {
      font-size: 0.95rem;
      color: var(--ink-soft);
      font-weight: 500;
    }

    .meta-item .meta-value.value-highlight {
      color: var(--burgundy);
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .detail-story h2 {
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
      color: var(--sage-dark);
    }

    .detail-story p {
      font-size: 0.97rem;
      line-height: 1.85;
      color: var(--ink-soft);
    }

    .detail-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ── Artist Profile ──────────────────────────────────── */
    .artist-profile-header {
      display: flex;
      gap: 2.5rem;
      align-items: flex-start;
      margin-bottom: 3rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
    }

    @media (max-width: 640px) {
      .artist-profile-header { flex-direction: column; }
    }

    .artist-photo-wrap {
      flex-shrink: 0;
    }

    .artist-photo-wrap .gold-frame {
      width: 200px;
    }

    .artist-photo-wrap .gold-frame img {
      width: 200px;
      height: 200px;
      object-fit: cover;
    }

    .artist-photo-placeholder {
      width: 200px;
      height: 200px;
      background: var(--cream-deeper);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .artist-info h1 {
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      margin-bottom: 0.3rem;
    }

    .artist-born {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    .artist-bio {
      font-size: 0.97rem;
      line-height: 1.85;
      color: var(--ink-soft);
      max-width: 680px;
    }

    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--ink);
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Empty State ─────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }

    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }

    .empty-state p { font-size: 0.9rem; }

    /* ── Back Link ───────────────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2rem;
      transition: var(--transition);
    }

    .back-link:hover { color: var(--gold); }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .site-header { padding: 0 1rem; }
      .site-main   { padding: 2rem 1rem 3rem; }
      .painting-grid { grid-template-columns: 1fr; gap: 1.5rem; }
      .detail-meta-grid { grid-template-columns: 1fr; }
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ── Site Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="{% url 'paintings:home' %}" class="site-logo">
        <div class="logo-mark">A</div>
        <span class="logo-text">Art<span>Vault</span></span>
      </a>
      <nav class="site-nav">
        <a href="{% url 'paintings:home' %}" id="nav-home">Collection</a>
        <a href="/admin/" id="nav-admin">Admin</a>
      </nav>
    </div>
  </header>

  <!-- ── Main Content ── -->
  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <p>ArtVault &mdash; <span>Private Collection</span> &mdash; All rights reserved</p>
  </footer>

</body>
</html>
